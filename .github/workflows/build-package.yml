name: Build and Publish

on:
  workflow_dispatch:
    inputs:
      full_compression:
        description: "Build all UPX compression variants"
        type: boolean
        default: false
  push:
  pull_request:

env:
  PACKAGE_NAME: "tollgate-captive-portal"
  NODE_VERSION: "22"

jobs:
  build-spa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm install

      - name: Build portal + admin
        run: node scripts/build-all.mjs

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: spa-dist
          path: dist/
          retention-days: 5

  define-package-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      ipk_matrix: ${{ steps.set-matrix.outputs.ipk_matrix }}
      apk_matrix: ${{ steps.set-matrix.outputs.apk_matrix }}
    steps:
      - id: set-matrix
        run: |
          : ${GITHUB_OUTPUT:=/tmp/github_output}
          cat > matrix.json << 'EOF'
          {
            "include": [
              { "architecture": "aarch64_cortex-a53", "sdk": "mediatek-filogic", "ipk": true, "apk": true },
              { "architecture": "aarch64_cortex-a72", "sdk": "bcm27xx-bcm2711",  "ipk": true, "apk": false },
              { "architecture": "arm_cortex-a7",      "sdk": "bcm27xx-bcm2709",  "ipk": true, "apk": false },
              { "architecture": "mipsel_24kc",        "sdk": "ramips-mt7621",    "ipk": true, "apk": false },
              { "architecture": "mips_24kc",          "sdk": "ath79-generic",    "ipk": true, "apk": false },
              { "architecture": "x86_64",             "sdk": "x86-64",           "ipk": true, "apk": false }
            ]
          }
          EOF

          echo "matrix=$(jq -c '{include: [
            (.include[] | select(.ipk) | del(.ipk, .apk) + {format: "ipk"}),
            (.include[] | select(.apk) | del(.ipk, .apk) + {format: "apk"})
          ]}' matrix.json)" >> $GITHUB_OUTPUT
          echo "ipk_matrix=$(jq -c '{include: [.include[] | select(.ipk) | del(.ipk, .apk) + {format: "ipk"}]}' matrix.json)" >> $GITHUB_OUTPUT
          echo "apk_matrix=$(jq -c '{include: [.include[] | select(.apk) | del(.ipk, .apk) + {format: "apk"}]}' matrix.json)" >> $GITHUB_OUTPUT

  determine-versioning:
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.determine-package-version.outputs.package_version }}
      release_channel: ${{ steps.determine-release-channel.outputs.release_channel }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: determine-package-version
        shell: bash
        run: |
          : ${GITHUB_OUTPUT:=/tmp/github_output}
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "package_version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            SANITIZED_BRANCH_NAME=$(echo "${GITHUB_REF_NAME}" | sed 's/\//-/g')
            COMMIT_HEIGHT=$(git rev-list --count HEAD)
            SHORT=$(git rev-parse --short HEAD)
            echo "package_version=${SANITIZED_BRANCH_NAME}.${COMMIT_HEIGHT}.${SHORT}" >> $GITHUB_OUTPUT
          fi

      - id: determine-release-channel
        shell: bash
        run: |
          : ${GITHUB_OUTPUT:=/tmp/github_output}
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            if   [[ $TAG_NAME =~ ^v[0-9]+\.[0-9]+\.[0-9]+-alpha ]]; then echo "release_channel=alpha"  >> $GITHUB_OUTPUT
            elif [[ $TAG_NAME =~ ^v[0-9]+\.[0-9]+\.[0-9]+-beta  ]]; then echo "release_channel=beta"   >> $GITHUB_OUTPUT
            elif [[ $TAG_NAME =~ ^v[0-9]+\.[0-9]+\.[0-9]+$      ]]; then echo "release_channel=stable" >> $GITHUB_OUTPUT
            else                                                          echo "release_channel=dev"    >> $GITHUB_OUTPUT
            fi
          else
            echo "release_channel=dev" >> $GITHUB_OUTPUT
          fi

  package-ipk:
    needs: [build-spa, define-package-matrix, determine-versioning]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.define-package-matrix.outputs.ipk_matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Download SPA dist
        uses: actions/download-artifact@v4
        with:
          name: spa-dist
          path: dist/

      - name: Build .ipk
        run: |
          set -euo pipefail
          PACKAGE_FILENAME=${PACKAGE_NAME}_${{ needs.determine-versioning.outputs.package_version }}_${{ matrix.architecture }}.ipk
          echo "PACKAGE_FILENAME=$PACKAGE_FILENAME" >> $GITHUB_ENV

          PAYLOAD=$(mktemp -d)

          install -d "$PAYLOAD/etc/tollgate/tollgate-captive-portal-site"
          cp -r dist/portal/. "$PAYLOAD/etc/tollgate/tollgate-captive-portal-site/"

          install -d "$PAYLOAD/www/tollgate"
          cp -r dist/admin/. "$PAYLOAD/www/tollgate/"

          install -d "$PAYLOAD/usr/libexec/rpcd"
          install -m 0755 openwrt/rpcd/tollgate "$PAYLOAD/usr/libexec/rpcd/tollgate"

          install -d "$PAYLOAD/usr/share/rpcd/acl.d"
          install -m 0644 openwrt/rpcd/tollgate_acl.json "$PAYLOAD/usr/share/rpcd/acl.d/tollgate.json"

          install -d "$PAYLOAD/etc/config"
          install -m 0644 openwrt/files/etc/config/uhttpd_tollgate "$PAYLOAD/etc/config/"

          install -d "$PAYLOAD/etc/uci-defaults"
          install -m 0755 packaging/files/etc/uci-defaults/91-tollgate-portal-setup "$PAYLOAD/etc/uci-defaults/"

          install -d "$PAYLOAD/usr/share/doc/${PACKAGE_NAME}"
          install -m 0644 LICENSE "$PAYLOAD/usr/share/doc/${PACKAGE_NAME}/LICENSE"

          mkdir -p artifacts
          env \
            PKG_NAME="$PACKAGE_NAME" \
            PKG_VERSION="${{ needs.determine-versioning.outputs.package_version }}" \
            ARCH="${{ matrix.architecture }}" \
            MAINTAINER="TollGate <tollgate@tollgate.me>" \
            LICENSE="MIT" \
            DEPENDS="tollgate-wrt, nodogsplash, luci, jq" \
            PROVIDES="tollgate-captive-portal-site" \
            REPLACES="tollgate-wrt" \
            DESCRIPTION="TollGate Captive Portal and Admin SPA" \
            packaging/build-ipk.sh "$PAYLOAD" "artifacts/$PACKAGE_FILENAME"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_FILENAME }}
          path: artifacts/${{ env.PACKAGE_FILENAME }}
          retention-days: 5

  package-apk:
    needs: [build-spa, define-package-matrix, determine-versioning]
    runs-on: ubuntu-latest
    container:
      image: openwrt/sdk:${{ matrix.sdk }}-25.12.0
      options: --user root
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.define-package-matrix.outputs.apk_matrix) }}
    steps:
      - uses: actions/checkout@v6
        with:
          path: src-checkout
          fetch-depth: 1

      - name: Download SPA dist
        uses: actions/download-artifact@v4
        with:
          name: spa-dist
          path: dist/

      - name: Stage SDK package tree
        run: |
          set -eu
          PACKAGE_FILENAME=${PACKAGE_NAME}_${{ needs.determine-versioning.outputs.package_version }}_${{ matrix.architecture }}.apk
          echo "PACKAGE_FILENAME=$PACKAGE_FILENAME" >> $GITHUB_ENV

          STAGE=/builder/package/${PACKAGE_NAME}
          mkdir -p "$STAGE"
          cp -r src-checkout/packaging/. "$STAGE/"
          cp -r dist/ "$STAGE/dist/"
          cp -r src-checkout/openwrt/ "$STAGE/openwrt/"
          cp src-checkout/LICENSE "$STAGE/LICENSE"

      - name: Configure SDK
        run: |
          cd /builder
          make defconfig
          {
            echo "CONFIG_PACKAGE_${PACKAGE_NAME}=y"
            echo "CONFIG_PACKAGE_tollgate-wrt=y"
            echo "CONFIG_PACKAGE_nodogsplash=y"
            echo "CONFIG_PACKAGE_luci=y"
            echo "CONFIG_PACKAGE_jq=y"
            echo "CONFIG_USE_APK=y"
          } >> .config
          make defconfig

      - name: Compile package
        shell: bash
        run: |
          cd /builder
          env \
            PACKAGE_VERSION=${{ needs.determine-versioning.outputs.package_version }} \
            make -j1 V=s package/${PACKAGE_NAME}/compile 2>&1 | tail -100

      - name: Collect artifact
        run: |
          PACKAGE_PATH=$(find /builder/bin/packages -name "*.apk" -type f | head -n1)
          if [ -z "$PACKAGE_PATH" ]; then
            echo "No .apk package found" >&2
            exit 1
          fi
          ls -lh "$PACKAGE_PATH"
          mkdir -p /github/workspace/artifacts
          cp "$PACKAGE_PATH" "/github/workspace/artifacts/${PACKAGE_FILENAME}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_FILENAME }}
          path: /github/workspace/artifacts/${{ env.PACKAGE_FILENAME }}
          retention-days: 5

  publish-metadata:
    needs: [determine-versioning, package-ipk, package-apk, define-package-matrix]
    if: always() && needs.package-ipk.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: ubuntu:latest
      options: --user root
    defaults:
      run:
        shell: bash
    env:
      BLOSSOM_SERVERS: "https://blossom.tollgate.me https://blossom.primal.net https://blossom1.orangesync.tech https://blossom2.orangesync.tech"
      BLOSSOM_MIN_SUCCESS: "2"
      RELAYS: "wss://relay.damus.io wss://nos.lol wss://nostr.mom wss://relay.tollgate.me wss://relay1.orangesync.tech wss://relay2.orangesync.tech wss://ngit1.orangesync.tech wss://ngit2.orangesync.tech"
      PUBLISH_MATRIX: ${{ needs.define-package-matrix.outputs.matrix }}
      PACKAGE_VERSION: ${{ needs.determine-versioning.outputs.package_version }}
      RELEASE_CHANNEL: ${{ needs.determine-versioning.outputs.release_channel }}
    steps:
      - name: Install required tools
        run: |
          apt-get update
          apt-get install -y curl jq
          curl -L "https://github.com/fiatjaf/nak/releases/download/v0.16.2/nak-v0.16.2-linux-amd64" -o /usr/local/bin/nak
          chmod +x /usr/local/bin/nak
          nak --version

      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "${{ env.PACKAGE_NAME }}_*"
          path: ./artifacts
          merge-multiple: true

      - name: Upload to Blossom (batched with retry + backoff)
        id: blossom
        env:
          NSEC_HEX: ${{ secrets.NSEC_HEX }}
        run: |
          set -euo pipefail

          upload_to_server() {
            local file="$1" server="$2"
            local attempt=1 delay=2 resp hash
            while [ $attempt -le 3 ]; do
              if resp=$(nak blossom upload --server "$server" --sec "$NSEC_HEX" "$file" < /dev/null 2>&1); then
                hash=$(printf '%s' "$resp" | jq -r '.sha256 // empty' 2>/dev/null || echo "")
                if [ -n "$hash" ] && [ "$hash" != "null" ]; then
                  printf '%s' "$hash"
                  return 0
                fi
              fi
              echo "    attempt ${attempt} to ${server} failed for $(basename "$file"); retrying in ${delay}s..." >&2
              echo "    response: $resp" >&2
              sleep $delay
              delay=$((delay * 2))
              attempt=$((attempt + 1))
            done
            return 1
          }

          upload_redundant() {
            local file="$1"
            local hash="" ok=0
            local servers_ok=()
            for server in $BLOSSOM_SERVERS; do
              if srv_hash=$(upload_to_server "$file" "$server"); then
                ok=$((ok + 1))
                echo "    ok: ${server} -> ${srv_hash}" >&2
                if [ -z "$hash" ]; then hash="$srv_hash"; fi
                if [ "$srv_hash" != "$hash" ]; then
                  echo "    WARNING: ${server} returned ${srv_hash}, expected ${hash}" >&2
                fi
                servers_ok+=("$server")
              else
                echo "    FAILED: ${server} (after retries)" >&2
              fi
            done
            if [ "$ok" -lt "$BLOSSOM_MIN_SUCCESS" ]; then
              echo "  ERROR: only ${ok} of $(echo $BLOSSOM_SERVERS | wc -w) blossom uploads succeeded (need >= ${BLOSSOM_MIN_SUCCESS})" >&2
              return 1
            fi
            echo "  ${ok}/$(echo $BLOSSOM_SERVERS | wc -w) mirrors ok" >&2
            printf '%s\n' "$hash"
            printf '%s\n' "${servers_ok[@]}"
          }

          : > manifest.jsonl
          mapfile -t cells < <(printf '%s\n' "$PUBLISH_MATRIX" | jq -c '.include[]')
          for cell in "${cells[@]}"; do
            arch=$(printf '%s' "$cell" | jq -r '.architecture')
            fmt=$(printf '%s' "$cell" | jq -r '.format')
            filename="${PACKAGE_NAME}_${PACKAGE_VERSION}_${arch}.${fmt}"
            file="./artifacts/${filename}"
            if [ ! -f "$file" ]; then
              echo "  skipping $filename (artifact not built)"
              continue
            fi

            echo "Uploading $filename to all blossom mirrors..."
            if ! result=$(upload_redundant "$file"); then
              echo "ERROR: blossom upload failed for $filename" >&2
              exit 1
            fi
            hash=$(printf '%s' "$result" | sed -n '1p')
            urls_json=$(printf '%s' "$result" | sed -n '2,$p' \
              | jq -R --arg hash "$hash" --arg fmt "$fmt" 'select(length>0) | . + "/" + $hash + "." + $fmt' \
              | jq -sc '.')
            jq -cn \
              --arg filename "$filename" --arg arch "$arch" --arg fmt "$fmt" \
              --arg hash "$hash" \
              --argjson urls "$urls_json" \
              '{filename:$filename, architecture:$arch, format:$fmt, compression:"none", hash:$hash, urls:$urls, url:$urls[0]}' \
              >> manifest.jsonl
            echo "  uploaded: $hash ($(printf '%s' "$urls_json" | jq -r 'length') mirrors)"
          done

      - name: Build NIP-94 events
        env:
          NSEC_HEX: ${{ secrets.NSEC_HEX }}
        run: |
          set -euo pipefail
          : > events.jsonl
          while read -r entry; do
            filename=$(printf '%s' "$entry" | jq -r '.filename')
            arch=$(printf '%s' "$entry" | jq -r '.architecture')
            fmt=$(printf '%s' "$entry" | jq -r '.format')
            hash=$(printf '%s' "$entry" | jq -r '.hash')

            url_tags=()
            while IFS= read -r u; do
              url_tags+=(--tag "url=$u")
            done < <(printf '%s' "$entry" | jq -r '.urls[]')

            nak event --sec "$NSEC_HEX" -k 1063 \
              -c "TollGate Package: ${PACKAGE_NAME} for ${arch}" \
              "${url_tags[@]}" \
              --tag m="application/octet-stream" \
              --tag x="$hash" \
              --tag ox="$hash" \
              --tag filename="$filename" \
              --tag A="$arch" \
              --tag v="$PACKAGE_VERSION" \
              --tag c="$RELEASE_CHANNEL" \
              --tag n="$PACKAGE_NAME" \
              --tag compression="none" \
              --tag format="$fmt" \
              < /dev/null \
              | jq -c . >> events.jsonl
          done < manifest.jsonl

      - name: Publish events
        run: |
          set -euo pipefail
          cat events.jsonl | nak event $RELAYS

      - name: Build summary
        run: |
          echo "Published $(wc -l < events.jsonl) NIP-94 events across $(echo $RELAYS | wc -w) relays."
          jq -r '"  \(.architecture) \(.format): \(.url)"' manifest.jsonl
