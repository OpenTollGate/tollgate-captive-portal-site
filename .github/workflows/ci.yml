name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  unit-tests:
    name: Unit tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test
      - run: npm run build

  e2e-tests:
    name: E2E tests + screenshots (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build

      - name: Start dev server
        run: npm run dev &
      - name: Wait for server
        run: npx wait-on http://localhost:5173 --timeout 30000

      - name: Run Playwright tests
        run: npx playwright test --project=desktop

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ github.event.pull_request.number || github.run_id }}
          path: |
            test-results/output/
            test-results/report/
          retention-days: 30

      - name: Upload visual diffs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-diffs-${{ github.event.pull_request.number || github.run_id }}
          path: |
            tests/e2e/**/*.png
            test-results/output/*-diff.png
          retention-days: 30

      - name: Post screenshots link to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const artifactName = `screenshots-${context.issue.number}`;
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📸 Test results\n\nPlaywright e2e tests + visual snapshots completed.\n\n**[Download screenshots →](${runUrl})**\n\nLook for the \`${artifactName}\` artifact at the bottom of the run page.\n\n${{ job.status == 'success' ? '✅ All tests passed.' : '⚠️ Some tests failed — check the visual diffs artifact.' }}`
            });
