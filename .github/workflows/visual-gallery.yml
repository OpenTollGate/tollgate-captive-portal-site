name: Update visual gallery

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-gallery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build

      - name: Start dev server
        run: npm run dev &
      - name: Wait for server
        run: npx wait-on http://localhost:5173 --timeout 30000

      - name: Run Playwright with snapshot update
        run: npx playwright test --project=desktop --update-snapshots || true

      - name: Build gallery page
        run: |
          mkdir -p gallery
          cat > gallery/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>TollGate Captive Portal — Visual Gallery</title>
            <style>
              body { font-family: system-ui, sans-serif; margin: 2rem; background: #0a0a0a; color: #fff; }
              h1 { color: #FFB54C; }
              .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 1rem; }
              .card { background: #111; border-radius: 8px; overflow: hidden; }
              .card img { width: 100%; display: block; }
              .card .label { padding: 0.5rem 1rem; font-size: 0.875rem; color: #888; }
            </style>
          </head>
          <body>
            <h1>TollGate Captive Portal — Visual Gallery</h1>
            <div class="grid">
          HTMLEOF
          for img in tests/e2e/*-snapshots/*/*.png test-results/output/*.png; do
            [ -f "$img" ] || continue
            name=$(basename "$img" .png)
            cp "$img" "gallery/${name}.png"
            echo "              <div class=\"card\"><img src=\"${name}.png\" alt=\"$name\"><div class=\"label\">$name</div></div>" >> gallery/index.html
          done
          cat >> gallery/index.html << 'HTMLEOF'
            </div>
          </body>
          </html>
          HTMLEOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gallery

  deploy:
    needs: build-gallery
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
