    <title>Tollgate Captive Portal</title>
    <!--
      TIP-03 prehydrate: read ?token= BEFORE the SPA bundle downloads so the
      payment flow can start without waiting for React to mount. Also strips
      the token from the URL immediately (Cashu tokens are bearer instruments
      and would otherwise leak via browser history, server logs, and Referer
      headers on any subsequent navigation).
      Matches the curl-equivalent path used by `pay_direct()` in the test
      framework: the SPA reads this global synchronously on first render.
    -->
    <script>
      (function () {
        try {
          var params = new URLSearchParams(window.location.search);
          var token = params.get('token');
          if (token) {
            window.__INITIAL_TOKEN__ = token;
            // Strip the bearer token from the address bar (security)
            var clean = window.location.pathname + window.location.hash;
            window.history.replaceState({}, document.title, clean);
          }
        } catch (e) {
          // URLSearchParams or history API may be unavailable in very old
          // embedded WebViews — fail silently, the SPA will fall through
          // to the manual token-entry UI.
        }
      })();
    </script>
    <script type="module" crossorigin src="/tollgate-captive-portal-site/pr-21/assets/portal-CtTMYuU5.js"></script>
